<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benjamín Moreno - Tecmilenio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <img src="https://www.hubspot.com/hubfs/FR%20HSCM%202023%20-%20Logos%20(500%20%C3%97%20200%20px).png" alt="Logo Tecmilenio" class="logo">
    <h1>Benjamín Abisai Moreno Hernández</h1>
    <p class="correo">Al03003432@tecmilenio.mx</p>
    <button onclick="mostrarMatricula()">Ver matrícula</button>
  </div>

  <div id="modal" class="modal-bg" onclick="cerrarModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <p class="matricula">T03003432</p>
      <button onclick="cerrarModal()">Cerrar</button>
    </div>
  </div>

  <script>
    function mostrarMatricula() {
      document.getElementById('modal').style.display = 'flex';
    }
    function cerrarModal() {
      document.getElementById('modal').style.display = 'none';
    }
  </script>

</body>
</html>
