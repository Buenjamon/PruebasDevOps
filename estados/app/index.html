<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reporte de Estados - Tecmilenio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      padding: 32px 16px;
    }
    .container {
      max-width: 750px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header img {
      width: 180px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 22px;
      color: #003087;
    }
    .header p {
      font-size: 14px;
      color: #666;
      margin-top: 4px;
    }
    .card {
      background: white;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card h2 {
      font-size: 16px;
      color: #003087;
      margin-bottom: 16px;
      border-bottom: 2px solid #003087;
      padding-bottom: 8px;
    }
    pre {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: #222;
      white-space: pre-wrap;
      line-height: 1.7;
    }
    .loading {
      color: #888;
      font-style: italic;
    }
    .error {
      color: #c0392b;
    }
    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Tecmilenio_logo.svg/1200px-Tecmilenio_logo.svg.png" alt="Tecmilenio">
      <h1>Reporte de Estados de México</h1>
      <p>Benjamín Abisai Moreno Hernández — Al03003432@tecmilenio.mx</p>
    </div>

    <div class="card">
      <h2>Resultados del procesamiento</h2>
      <pre id="contenido" class="loading">Cargando resultados...</pre>
    </div>

    <div class="footer">
      Generado automáticamente por AWS CodeBuild + S3
    </div>
  </div>

  <script>
    fetch('resultado.txt')
      .then(res => {
        if (!res.ok) throw new Error('No se pudo cargar resultado.txt');
        return res.text();
      })
      .then(text => {
        const el = document.getElementById('contenido');
        el.textContent = text;
        el.classList.remove('loading');
      })
      .catch(err => {
        const el = document.getElementById('contenido');
        el.textContent = 'Error al cargar los resultados: ' + err.message;
        el.classList.add('error');
      });
  </script>
</body>
</html>
