version: 0.2

env:
  variables:
    VERSION: "1.0"
    BUCKET: "devopsprueba1"

phases:
  install:
    commands:
      - echo "Iniciando build - Version $VERSION"
      - pip install --quiet boto3

  build:
    commands:
      - echo "Ejecutando script de procesamiento..."
      - cd estados/app && python procesar.py && cd ../..
      - echo "Contenido de estados/app:"
      - ls -la estados/app/
      - test -f estados/app/resultado.txt && echo "OK" || (echo "ERROR resultado.txt no generado" && exit 1)

  post_build:
    commands:
      - echo "Subiendo archivos a S3..."
      - aws s3 cp estados/app/index.html s3://$BUCKET/estados/index.html --content-type "text/html"
      - aws s3 cp estados/app/resultado.txt s3://$BUCKET/estados/resultado.txt --content-type "text/plain"
      - aws s3 cp estados/app/data.txt s3://$BUCKET/estados/data.txt
      - aws s3 cp estados/app/procesar.py s3://$BUCKET/estados/procesar.py
      - FECHA=$(date "+%Y-%m-%d %H:%M:%S")
      - COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "N/A")
      - echo "==================================================" >> backup.log
      - echo "Fecha y Hora  $FECHA" >> backup.log
      - echo "Version       $VERSION" >> backup.log
      - echo "Archivo       data.txt" >> backup.log
      - echo "Resultado     resultado.txt generado y subido a S3" >> backup.log
      - echo "Commit        $COMMIT" >> backup.log
      - echo "==================================================" >> backup.log
      - aws s3 cp backup.log s3://$BUCKET/estados/backup.log
      - echo "Pipeline completado exitosamente."

artifacts:
  files:
    - estados/app/index.html
    - estados/app/resultado.txt
    - estados/app/data.txt
    - backup.log
  base-directory: .