version: 0.2

env:
  variables:
    VERSION: "1.0"

phases:
  install:
    commands:
      - echo "Iniciando build - Version $VERSION"

  build:
    commands:
      - echo "Construyendo imagen Docker..."
      - docker build -t filtro-estudiantes ./filtro/app
      - echo "Ejecutando contenedor..."
      - docker run --rm
          -v $(pwd)/filtro/app:/app
          -e VERSION=$VERSION
          filtro-estudiantes

  post_build:
    commands:
      - echo "Subiendo archivos a S3..."
      - aws s3 cp filtro/app/resultados.json s3://devopsprueba1/filtro/resultados.json
      - aws s3 cp filtro/app/backup.log s3://devopsprueba1/filtro/backup.log
      - aws s3 cp filtro/app/estudiantes.json s3://devopsprueba1/filtro/estudiantes.json
      - echo "Archivos subidos correctamente."

artifacts:
  files:
    - filtro/app/resultados.json
    - filtro/app/backup.log
  base-directory: .
